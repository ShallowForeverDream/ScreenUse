<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { color-scheme: dark; font-family: Inter, "Microsoft YaHei UI", system-ui, sans-serif; }
      body { width: 300px; margin: 0; padding: 16px; color: #e5edf7; background: #0b1220; }
      .eyebrow { color: #7dd3fc; font-size: 11px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
      h1 { margin: 7px 0 5px; font-size: 18px; }
      p { margin: 0; color: #94a3b8; font-size: 12px; line-height: 1.55; }
      .card { margin: 14px 0; padding: 12px; border: 1px solid #263449; border-radius: 14px; background: #101a2b; }
      .title { margin-top: 6px; color: #dbeafe; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .url { margin-top: 4px; color: #64748b; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .state { display: flex; align-items: center; gap: 7px; color: #cbd5e1; font-size: 12px; }
      .dot { width: 8px; height: 8px; border-radius: 999px; background: #64748b; }
      .dot.ok { background: #22c55e; box-shadow: 0 0 12px rgba(34,197,94,.6); }
      .dot.bad { background: #fb7185; }
      button { width: 100%; border: 1px solid #2e4962; border-radius: 12px; padding: 10px 12px; color: #e2e8f0; background: #16263a; cursor: pointer; font: inherit; }
      button:hover { border-color: #38bdf8; background: #1a3048; }
      small { display: block; margin-top: 9px; color: #64748b; line-height: 1.45; }
    </style>
  </head>
  <body>
    <div class="eyebrow">ScreenUse 0.2</div>
    <h1>前台标签页上下文</h1>
    <p>只把当前活动标签页的标题和精简 URL 发送到本机。不会枚举或保存其他标签页。</p>
    <div class="card">
      <div class="state"><span class="dot" id="dot"></span><span id="state">读取状态…</span></div>
      <div class="title" id="title">暂无活动标题</div>
      <div class="url" id="url"></div>
    </div>
    <button id="sync" type="button">立即同步当前标签页</button>
    <small>ScreenUse 桌面端需在本机运行；平时会自动同步，无需打开此窗口。</small>
    <script src="popup.js"></script>
  </body>
</html>
